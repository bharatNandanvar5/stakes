name: Deploy

on:
  workflow_run:
    workflows: ["STAKE CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy (Backend)
        run: curl ${{ secrets.RENDER_BACKEND_DEPLOY }}

      - name: Trigger Render Deploy (Frontend)
        run: curl ${{ secrets.RENDER_FRONTEND_DEPLOY }}
